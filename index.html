<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriele D'Oro - Sito Piazze</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content"></div>
    </header>

    <main>
        <section class="hero">
            <h2 class="hero-title">Benvenuti Su</h2>
            <p class="hero-subtitle"> <img src="img/logo.png" alt="Logo" class="hero-logo">
        </section>
        <div class="center-btn-container">
            <a href="https://www.abacatania.it" class="center-btn">Contatti</a>
        </div>

        <section class="cards-section">
            <a href="piazza-palermo.html" class="card card-link">
                <img src="img/Piazza_palermo.png" alt="Piazza 1" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">Piazza Pretoria Palermo</h3>
                </div>
            </a>
            <a href="piazza-catania.html" class="card card-link">
                <img src="img/Piazza_catania.png" alt="Piazza 2" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">Piazza Duomo Catania</h3>
                </div>
            </a>
            <a href="piazza-trapani.html" class="card card-link">
                <img src="img/Piazza_trapani.png" alt="Piazza 3" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">Piazza Vittorio Emanuele Trapani</h3>
                </div>
            </a>
            <a href="piazza-messina.html" class="card card-link">
                <img src="img/Piazza_messina.png" alt="Piazza 4" class="card-img">
                <div class="card-content">
                    <h3 class="card-title">Piazza Duomo Messina</h3>
                </div>
            </a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-social">
            <span>Trovaci anche su</span>
            <a href="https://www.trustpilot.com/" target="_blank" rel="noopener" aria-label="Trustpilot"><img src="img/shield.png" alt="Trustpilot" class="footer-icon"></a>
            <a href="https://www.instagram.com/" target="_blank" rel="noopener" aria-label="Instagram"><img src="img/instagram.png" alt="Instagram" class="footer-icon"></a>
            <a href="https://x.com/" target="_blank" rel="noopener" aria-label="X"><img src="img/twitter.png" alt="X" class="footer-icon"></a>
        </div>
    </footer>
</body>
</html>
